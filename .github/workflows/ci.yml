name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-core libreoffice-writer

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest odfpy matplotlib python-dateutil python-holidays icalendar

      - name: Run tests
        run: |
          pytest -q

      - name: Generate example report
        run: |
          python scripts/ci_generate_report.py

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedleave-report
          path: |
            reports/fedleave_report.odt
            reports/fedleave_report.pdf
